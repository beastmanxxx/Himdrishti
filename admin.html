<html lang="en">

<head>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius-lg: 24px;
            --radius-md: 16px;
            --shadow-premium: 0 20px 50px -12px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        #root {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .admin-navbar {
            height: 80px;
            background: #ffffff;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .admin-brand {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1.5px;
        }

        .blink-label {
            font-size: 11px;
            font-weight: 800;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
            padding: 6px 14px;
            border-radius: 30px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: pulse 2s infinite;
            border: 1px solid rgba(239, 68, 68, 0.1);
        }

        .blink-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 10px #ef4444;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(0.95);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Layout */
        .admin-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .admin-sidebar {
            width: 300px;
            background: #ffffff;
            border-right: 1px solid var(--border);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-section-title {
            font-size: 12px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0 16px 20px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 22px;
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 600;
            border-radius: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
        }

        .sidebar-item:hover {
            background: #f1f5f9;
            color: var(--primary);
        }

        .sidebar-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.3);
        }

        .admin-main {
            flex: 1;
            padding: 50px;
            overflow-y: auto;
            background: var(--bg);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 45px;
        }

        .page-title {
            font-size: 36px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1px;
        }

        .admin-btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
            box-shadow: 0 8px 15px rgba(37, 99, 235, 0.2);
        }

        .admin-btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(37, 99, 235, 0.35);
        }

        /* --- REDESIGNED POPUPS --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 30px;
        }

        .modal-content {
            background: #ffffff;
            width: 100%;
            max-width: 800px;
            max-height: 92vh;
            padding: 50px;
            border-radius: 36px;
            box-shadow: var(--shadow-premium);
            overflow-y: auto;
            position: relative;
            animation: modalSpring 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes modalSpring {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(30px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-close-btn {
            position: absolute;
            top: 35px;
            right: 35px;
            width: 44px;
            height: 44px;
            border-radius: 15px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #64748b;
            border: none;
            transition: all 0.3s ease;
        }

        .modal-close-btn:hover {
            background: #fee2e2;
            color: #ef4444;
            transform: rotate(90deg);
        }

        .modal-header {
            margin-bottom: 40px;
        }

        .modal-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .modal-desc {
            font-size: 16px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .form-card {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 35px;
        }

        .form-section-head {
            font-size: 14px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .form-section-head::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .field-group {
            margin-bottom: 28px;
        }

        .field-label {
            display: block;
            font-size: 15px;
            font-weight: 700;
            color: #334155;
            margin-bottom: 12px;
        }

        .premium-input,
        .premium-select {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            font-family: inherit;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            background: #ffffff;
            color: var(--text-main);
        }

        .premium-input:focus,
        .premium-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.1);
            transform: translateY(-1px);
        }

        .premium-input::placeholder {
            color: #cbd5e1;
        }

        .content-block {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 25px;
            margin-bottom: 25px;
            transition: all 0.3s;
        }

        .content-block:focus-within {
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }

        .block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .block-tag {
            font-size: 12px;
            font-weight: 800;
            color: var(--primary);
            background: #eff6ff;
            padding: 5px 14px;
            border-radius: 10px;
            text-transform: uppercase;
        }

        .rich-editor {
            min-height: 150px;
            padding: 20px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            outline: none;
            font-size: 16px;
            line-height: 1.8;
            color: #334155;
            transition: all 0.3s;
        }

        .rich-editor:focus {
            background: #ffffff;
            border-color: var(--primary);
        }

        .add-block-trigger {
            background: transparent;
            color: var(--text-muted);
            border: 2px dashed #cbd5e1;
            padding: 24px;
            border-radius: 22px;
            width: 100%;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 45px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 16px;
        }

        .add-block-trigger:hover {
            background: #eff6ff;
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .modal-actions-footer {
            display: flex;
            gap: 20px;
            border-top: 1px solid var(--border);
            padding-top: 40px;
            margin-top: 20px;
        }

        .action-button {
            flex: 1;
            padding: 18px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-size: 17px;
            transition: all 0.3s;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #64748b;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
            color: var(--text-main);
        }

        .btn-primary-action {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .btn-primary-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.3);
        }

        /* Floating Toolbar Upgrade */
        .style-toolbar {
            position: absolute;
            background: #0f172a;
            padding: 12px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 2000;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 260px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .style-row {
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .tool-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: white;
            padding: 10px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #60a5fa;
        }

        .tool-btn-text {
            font-size: 11px;
            font-weight: 800;
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.08);
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
        }

        .color-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s;
        }

        .color-circle:hover {
            transform: scale(1.2);
            border-color: white;
        }

        /* List Styling */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card-item {
            background: #ffffff;
            padding: 25px 32px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            gap: 30px;
            border: 1px solid var(--border);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card-item:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
        }

        .item-thumb {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            object-fit: cover;
            border: 1px solid var(--border);
        }

        .item-details {
            flex: 1;
        }

        .item-heading {
            font-weight: 700;
            color: var(--text-main);
            font-size: 18px;
            margin-bottom: 8px;
        }

        .badge-pill {
            background: #f1f5f9;
            color: #475569;
            padding: 5px 14px;
            border-radius: 12px;
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 800;
        }

        .item-time-box {
            text-align: right;
            margin-right: 25px;
        }

        .d-text {
            display: block;
            font-size: 13px;
            font-weight: 800;
            color: var(--text-main);
        }

        .t-text {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .action-group {
            display: flex;
            gap: 12px;
        }

        .btn-action-circle {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }

        .btn-del {
            background: rgba(239, 68, 68, 0.08);
            color: #ef4444;
        }

        .btn-del:hover {
            background: #ef4444;
            color: white;
            transform: rotate(8deg);
        }

        .btn-expand {
            background: #f1f5f9;
            color: #64748b;
        }

        .btn-edit {
            background: #eff6ff;
            color: var(--primary);
        }

        .btn-edit:hover {
            background: var(--primary);
            color: white;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icons = {
            Articles: () => <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="22" height="22"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10l4 4v10a2 2 0 0 1-2 2z"></path><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>,
            Categories: () => <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="22" height="22"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>,
            Home: () => <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="22" height="22"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>,
            Plus: () => <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 6v12m6-6H6"></path></svg>,
            Trash: () => <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>,
            Bold: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path></svg>,
            Italic: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="4" x2="10" y2="4"></line><line x1="14" y1="20" x2="5" y2="20"></line><line x1="15" y1="4" x2="9" y2="20"></line></svg>,
            X: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            ChevronDown: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>,
            Edit: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
        };

        const TEN_COLORS = ['#000000', '#64748b', '#2563eb', '#ef4444', '#10b981', '#14b8a6', '#f59e0b', '#f97316', '#8b5cf6', '#ec4899'];

        function ParagraphInput({ initialValue, index, onChange, onRemove }) {
            const inputRef = useRef(null);
            useEffect(() => { if (inputRef.current) inputRef.current.innerHTML = initialValue || ''; }, [initialValue]);
            return (
                <div className="content-block">
                    <div className="block-header">
                        <span className="block-tag">Section {index + 1}</span>
                        <button className="modal-close-btn" style={{ width: '32px', height: '32px', position: 'static' }} onClick={onRemove}><Icons.X /></button>
                    </div>
                    <div ref={inputRef} contentEditable className="rich-editor" onBlur={() => onChange(inputRef.current.innerHTML)} suppressContentEditableWarning={true} />
                </div>
            );
        }

        function AdminPanel() {
            const [activeSection, setActiveSection] = useState('articles');
            const [isArticleModalOpen, setIsArticleModalOpen] = useState(false);
            const [isCategoryModalOpen, setIsCategoryModalOpen] = useState(false);
            const [categories, setCategories] = useState([]);
            const [articles, setArticles] = useState([]);
            const [articleData, setArticleData] = useState({ heading: '', imageLink: '', category: '', paragraphs: [''], tempCat: '' });
            const [editingId, setEditingId] = useState(null);
            const [expandedId, setExpandedId] = useState(null);
            const [toolbar, setToolbar] = useState({ show: false, x: 0, y: 0 });

            useEffect(() => {
                if (window.firebaseDB) {
                    const { db, collection, onSnapshot, query, orderBy } = window.firebaseDB;
                    const unsubCat = onSnapshot(query(collection(db, "categories"), orderBy("name")), snap => setCategories(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                    const unsubArt = onSnapshot(query(collection(db, "articles"), orderBy("createdAt", "desc")), snap => setArticles(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                    return () => { unsubCat(); unsubArt(); };
                }
            }, []);

            useEffect(() => {
                const handleSelection = () => {
                    const selection = window.getSelection();
                    if (selection.toString().length > 0 && selection.rangeCount > 0) {
                        const rect = selection.getRangeAt(0).getBoundingClientRect();
                        setToolbar({ show: true, x: rect.left + rect.width / 2, y: rect.top - 140 });
                    } else { setToolbar({ ...toolbar, show: false }); }
                };
                document.addEventListener('mouseup', handleSelection);
                return () => document.removeEventListener('mouseup', handleSelection);
            }, [toolbar]);

            const formatDate = (isoString) => {
                const d = new Date(isoString);
                return { date: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }), time: d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }) };
            };

            const handleSaveArticle = async () => {
                if (!articleData.heading || !articleData.category) return alert("Please fill heading and category!");
                const { db, collection, addDoc, updateDoc, doc } = window.firebaseDB;
                if (editingId) await updateDoc(doc(db, "articles", editingId), { ...articleData });
                else await addDoc(collection(db, "articles"), { ...articleData, createdAt: new Date().toISOString() });
                setIsArticleModalOpen(false); setEditingId(null);
            };

            return (
                <React.Fragment>
                    <nav className="admin-navbar">
                        <div className="brand-container"><div className="blink-label"><span className="blink-dot"></span>Live Database Ascess</div><div className="admin-brand">Himdrishti Admin Cantroll Panel</div><div className="blink-label"><span className="blink-dot"></span>Live Database Ascess</div></div>
                    </nav>

                    <div className="admin-layout">
                        <aside className="admin-sidebar">
                            <div className="sidebar-section-title">Main Portal</div>
                            <button className={`sidebar-item ${activeSection === 'articles' ? 'active' : ''}`} onClick={() => setActiveSection('articles')}><Icons.Articles />Articles / Blogs</button>
                            <button className={`sidebar-item ${activeSection === 'categories' ? 'active' : ''}`} onClick={() => setActiveSection('categories')}><Icons.Categories />Categories</button>
                            <div style={{ marginTop: 'auto' }}><a href="index.html" className="sidebar-item"><Icons.Home />Exit to Website</a></div>
                        </aside>

                        <main className="admin-main">
                            <div className="page-header">
                                <h1 className="page-title">{activeSection === 'articles' ? 'Articles Hub' : 'Data Domains'}</h1>
                                <button className="admin-btn-primary" onClick={() => { if (activeSection === 'articles') { setEditingId(null); setArticleData({ heading: '', imageLink: '', category: '', paragraphs: [''] }); setIsArticleModalOpen(true); } else { setArticleData({ ...articleData, tempCat: '' }); setIsCategoryModalOpen(true); } }}><Icons.Plus /> {activeSection === 'articles' ? 'New Article' : 'New Domain'}</button>
                            </div>

                            <div className="list-container">
                                {activeSection === 'articles' ? (
                                    articles.map(art => {
                                        const { date, time } = formatDate(art.createdAt);
                                        return (
                                            <div key={art.id} className="list-item-wrapper">
                                                <div className="card-item">
                                                    {(() => {
                                                        const ytMatch = art.imageLink && art.imageLink.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]{11})/);
                                                        if (ytMatch) {
                                                            return (
                                                                <div className="item-thumb" style={{ background: 'linear-gradient(135deg, #1a1a2e, #c4302b)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '4px', position: 'relative', overflow: 'hidden' }}>
                                                                    <img
                                                                        src={`https://img.youtube.com/vi/${ytMatch[1]}/mqdefault.jpg`}
                                                                        style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', opacity: 0.4 }}
                                                                        onError={e => { e.target.style.display = 'none'; }}
                                                                    />
                                                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="white" style={{ position: 'relative', zIndex: 1, filter: 'drop-shadow(0 2px 4px rgba(0,0,0,0.5))' }}>
                                                                        <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/>
                                                                    </svg>
                                                                    <span style={{ position: 'relative', zIndex: 1, fontSize: '9px', color: 'white', fontWeight: 700, letterSpacing: '0.5px', textTransform: 'uppercase' }}>YouTube</span>
                                                                </div>
                                                            );
                                                        } else {
                                                            return <img src={art.imageLink || 'front.png'} className="item-thumb" onError={e => { e.target.src = 'front.png'; }} />;
                                                        }
                                                    })()}
                                                    <div className="item-details"><div className="item-heading">{art.heading}</div><span className="badge-pill">{art.category}</span></div>
                                                    <div className="item-time-box"><span className="d-text">{date}</span><span className="t-text">{time}</span></div>
                                                    <div className="action-group">
                                                        <button className="btn-action-circle btn-edit" onClick={() => { setArticleData({ heading: art.heading, imageLink: art.imageLink, category: art.category, paragraphs: art.paragraphs }); setEditingId(art.id); setIsArticleModalOpen(true); }}><Icons.Edit /></button>
                                                        <button className={`btn-action-circle btn-expand ${expandedId === art.id ? 'active' : ''}`} onClick={() => setExpandedId(expandedId === art.id ? null : art.id)}><Icons.ChevronDown /></button>
                                                        <button className="btn-action-circle btn-del" onClick={async () => { if (confirm("Delete?")) await window.firebaseDB.deleteDoc(window.firebaseDB.doc(window.firebaseDB.db, "articles", art.id)); }}><Icons.Trash /></button>
                                                    </div>
                                                </div>
                                                {expandedId === art.id && <div className="article-preview-panel">{art.paragraphs.map((p, i) => <div key={i} className="preview-para" dangerouslySetInnerHTML={{ __html: p }} />)}</div>}
                                            </div>
                                        );
                                    })
                                ) : (
                                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(350px, 1fr))', gap: '24px' }}>
                                        {categories.map(cat => {
                                            const count = articles.filter(a => a.category === cat.name).length;
                                            return (
                                                <div key={cat.id} className="card-item">
                                                    <div className="item-details"><div className="item-heading" style={{ marginBottom: '6px' }}>{cat.name}</div><span className="badge-pill" style={{ background: '#eff6ff', color: '#2563eb' }}>{count} Resources</span></div>
                                                    <button className="btn-action-circle btn-del" onClick={async () => { if (confirm(`Delete domain "${cat.name}"?`)) await window.firebaseDB.deleteDoc(window.firebaseDB.doc(window.firebaseDB.db, "categories", cat.id)); }}><Icons.Trash /></button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        </main>
                    </div>

                    {/* REDESIGNED POPUPS */}
                    {isArticleModalOpen && (
                        <div className="modal-overlay" onClick={() => setIsArticleModalOpen(false)}>
                            <div className="modal-content" onClick={e => e.stopPropagation()}>
                                <button className="modal-close-btn" onClick={() => setIsArticleModalOpen(false)}><Icons.X /></button>
                                <div className="modal-header">
                                    <h2 className="modal-title">{editingId ? 'Refine Resource' : 'Publish Resource'}</h2>
                                    <p className="modal-desc">Configure your study material with rich formatting and metadata.</p>
                                </div>

                                <div className="form-card">
                                    <div className="form-section-head">Resource Config</div>
                                    <div className="field-group">
                                        <label className="field-label">Media Link <span style={{ fontSize: '12px', color: '#64748b', fontWeight: 500 }}>(Image URL or YouTube Link)</span></label>
                                        <input
                                            type="text"
                                            className="premium-input"
                                            placeholder="Paste image URL or YouTube video link..."
                                            value={articleData.imageLink}
                                            onChange={e => setArticleData({ ...articleData, imageLink: e.target.value })}
                                        />
                                        {/* Live Preview */}
                                        {articleData.imageLink && (() => {
                                            const ytMatch = articleData.imageLink.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]{11})/);
                                            if (ytMatch) {
                                                return (
                                                    <div style={{ marginTop: '14px', borderRadius: '16px', overflow: 'hidden', border: '2px solid #e2e8f0', position: 'relative' }}>
                                                        <div style={{ background: '#0f172a', padding: '8px 14px', display: 'flex', alignItems: 'center', gap: '8px' }}>
                                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="#ef4444"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                                                            <span style={{ color: 'white', fontSize: '12px', fontWeight: 600 }}>YouTube Preview</span>
                                                        </div>
                                                        <iframe
                                                            width="100%"
                                                            height="220"
                                                            src={`https://www.youtube.com/embed/${ytMatch[1]}`}
                                                            frameBorder="0"
                                                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                                            allowFullScreen
                                                            style={{ display: 'block' }}
                                                        />
                                                    </div>
                                                );
                                            } else {
                                                return (
                                                    <div style={{ marginTop: '14px', borderRadius: '16px', overflow: 'hidden', border: '2px solid #e2e8f0' }}>
                                                        <img src={articleData.imageLink} alt="Preview" style={{ width: '100%', maxHeight: '200px', objectFit: 'cover', display: 'block' }} onError={e => { e.target.style.display='none'; }} />
                                                    </div>
                                                );
                                            }
                                        })()}
                                    </div>
                                    <div className="field-group"><label className="field-label">Headline</label><input type="text" className="premium-input" placeholder="e.g. Modern History Notes" value={articleData.heading} onChange={e => setArticleData({ ...articleData, heading: e.target.value })} /></div>
                                    <div className="field-group"><label className="field-label">Domain Category</label><select className="premium-select" value={articleData.category} onChange={e => setArticleData({ ...articleData, category: e.target.value })}><option value="">Select Domain</option>{categories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}</select></div>
                                </div>

                                <div className="form-section-head" style={{ marginBottom: '30px' }}>Rich Content Blocks</div>
                                {articleData.paragraphs.map((para, index) => (
                                    <ParagraphInput key={index} index={index} initialValue={para} onChange={(html) => { const n = [...articleData.paragraphs]; n[index] = html; setArticleData({ ...articleData, paragraphs: n }); }} onRemove={() => { const n = articleData.paragraphs.filter((_, i) => i !== index); setArticleData({ ...articleData, paragraphs: n.length ? n : [''] }); }} />
                                ))}
                                <button className="add-block-trigger" onClick={() => setArticleData({ ...articleData, paragraphs: [...articleData.paragraphs, ''] })}><Icons.Plus /> Add Content Block</button>

                                <div className="modal-actions-footer"><button className="action-button btn-secondary" onClick={() => setIsArticleModalOpen(false)}>Discard</button><button className="action-button btn-primary-action" onClick={handleSaveArticle}>{editingId ? 'Update Resource' : 'Publish Resource'}</button></div>
                            </div>
                        </div>
                    )}

                    {isCategoryModalOpen && (
                        <div className="modal-overlay" onClick={() => setIsCategoryModalOpen(false)}>
                            <div className="modal-content" style={{ maxWidth: '480px' }} onClick={e => e.stopPropagation()}>
                                <button className="modal-close-btn" onClick={() => setIsCategoryModalOpen(false)}><Icons.X /></button>
                                <div className="modal-header">
                                    <h2 className="modal-title">New Domain</h2>
                                    <p className="modal-desc">Create a new organizational category.</p>
                                </div>
                                <div className="field-group" style={{ marginBottom: '10px' }}><label className="field-label">Domain Name</label><input type="text" className="premium-input" placeholder="e.g. Ancient India" onChange={e => setArticleData({ ...articleData, tempCat: e.target.value })} autoFocus /></div>
                                <div className="modal-actions-footer" style={{ border: 'none', paddingTop: 0 }}><button className="action-button btn-secondary" onClick={() => setIsCategoryModalOpen(false)}>Cancel</button><button className="action-button btn-primary-action" onClick={async () => { if (!articleData.tempCat) return; await window.firebaseDB.addDoc(window.firebaseDB.collection(window.firebaseDB.db, "categories"), { name: articleData.tempCat, createdAt: new Date().toISOString() }); setIsCategoryModalOpen(false); }}>Register Domain</button></div>
                            </div>
                        </div>
                    )}

                    {toolbar.show && (
                        <div className="style-toolbar" style={{ left: toolbar.x, top: toolbar.y, transform: 'translateX(-50%)' }}>
                            <div className="style-row">
                                <button className="tool-btn" onMouseDown={e => { e.preventDefault(); document.execCommand('bold'); }}><Icons.Bold /></button>
                                <button className="tool-btn" onMouseDown={e => { e.preventDefault(); document.execCommand('italic'); }}><Icons.Italic /></button>
                                <button className="tool-btn-text" onMouseDown={e => { e.preventDefault(); document.execCommand('removeFormat'); }}>RESET STYLE</button>
                            </div>
                            <div className="color-grid">{TEN_COLORS.map(c => (<div key={c} className="color-circle" style={{ background: c }} onMouseDown={e => { e.preventDefault(); document.execCommand('foreColor', false, c); }}></div>))}</div>
                        </div>
                    )}
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminPanel />);
    </script>
</body>

</html>
