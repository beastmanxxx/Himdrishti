<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Himdrishti | Admin Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, onSnapshot, query, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvamt5y4-TXXAzmrEY2DtN-oeq5ZMq4uE",
            authDomain: "himdrishti-5b15a.firebaseapp.com",
            projectId: "himdrishti-5b15a",
            storageBucket: "himdrishti-5b15a.firebasestorage.app",
            messagingSenderId: "478925385461",
            appId: "1:478925385461:web:04aee67decfb7acfdbdfbc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.firebaseDB = { db, collection, addDoc, getDocs, deleteDoc, doc, onSnapshot, query, orderBy, updateDoc };

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius-lg: 24px;
            --radius-md: 16px;
            --shadow-premium: 0 20px 50px -12px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        #root {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .admin-navbar {
            height: 80px;
            background: #ffffff;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .admin-brand {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1.5px;
        }

        .blink-label {
            font-size: 11px;
            font-weight: 800;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
            padding: 6px 14px;
            border-radius: 30px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: pulse 2s infinite;
            border: 1px solid rgba(239, 68, 68, 0.1);
        }

        .blink-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 10px #ef4444;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(0.95);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Layout */
        .admin-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .admin-sidebar {
            width: 300px;
            background: #ffffff;
            border-right: 1px solid var(--border);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-section-title {
            font-size: 12px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0 16px 20px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 22px;
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 600;
            border-radius: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
        }

        .sidebar-item:hover {
            background: #f1f5f9;
            color: var(--primary);
        }

        .sidebar-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.3);
        }

        .admin-main {
            flex: 1;
            padding: 50px;
            overflow-y: auto;
            background: var(--bg);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 45px;
        }

        .page-title {
            font-size: 36px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1px;
        }

        .admin-btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
            box-shadow: 0 8px 15px rgba(37, 99, 235, 0.2);
        }

        .admin-btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(37, 99, 235, 0.35);
        }

        /* --- REDESIGNED POPUPS --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 30px;
        }

        .modal-content {
            background: #ffffff;
            width: 100%;
            max-width: 800px;
            max-height: 92vh;
            padding: 50px;
            border-radius: 36px;
            box-shadow: var(--shadow-premium);
            overflow-y: auto;
            position: relative;
            animation: modalSpring 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes modalSpring {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(30px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-close-btn {
            position: absolute;
            top: 35px;
            right: 35px;
            width: 44px;
            height: 44px;
            border-radius: 15px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #64748b;
            border: none;
            transition: all 0.3s ease;
        }

        .modal-close-btn:hover {
            background: #fee2e2;
            color: #ef4444;
            transform: rotate(90deg);
        }

        .modal-header {
            margin-bottom: 40px;
        }

        .modal-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .modal-desc {
            font-size: 16px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .form-card {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 35px;
        }

        .form-section-head {
            font-size: 14px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .form-section-head::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .field-group {
            margin-bottom: 28px;
        }

        .field-label {
            display: block;
            font-size: 15px;
            font-weight: 700;
            color: #334155;
            margin-bottom: 12px;
        }

        .premium-input,
        .premium-select {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            font-family: inherit;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            background: #ffffff;
            color: var(--text-main);
        }

        .premium-input:focus,
        .premium-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.1);
            transform: translateY(-1px);
        }

        .premium-input::placeholder {
            color: #cbd5e1;
        }

        .content-block {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 25px;
            margin-bottom: 25px;
            transition: all 0.3s;
        }

        .content-block:focus-within {
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }

        .block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .block-tag {
            font-size: 12px;
            font-weight: 800;
            color: var(--primary);
            background: #eff6ff;
            padding: 5px 14px;
            border-radius: 10px;
            text-transform: uppercase;
        }

        .rich-editor {
            min-height: 150px;
            padding: 20px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            outline: none;
            font-size: 16px;
            line-height: 1.8;
            color: #334155;
            transition: all 0.3s;
        }

        .rich-editor:focus {
            background: #ffffff;
            border-color: var(--primary);
        }

        .add-block-trigger {
            background: transparent;
            color: var(--text-muted);
            border: 2px dashed #cbd5e1;
            padding: 24px;
            border-radius: 22px;
            width: 100%;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 45px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 16px;
        }

        .add-block-trigger:hover {
            background: #eff6ff;
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .modal-actions-footer {
            display: flex;
            gap: 20px;
            border-top: 1px solid var(--border);
            padding-top: 40px;
            margin-top: 20px;
        }

        .action-button {
            flex: 1;
            padding: 18px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-size: 17px;
            transition: all 0.3s;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #64748b;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
            color: var(--text-main);
        }

        .btn-primary-action {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .btn-primary-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.3);
        }

        /* Floating Toolbar Upgrade */
        .style-toolbar {
            position: absolute;
            background: #0f172a;
            padding: 12px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 2000;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 260px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .style-row {
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .tool-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: white;
            padding: 10px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #60a5fa;
        }

        .tool-btn-text {
            font-size: 11px;
            font-weight: 800;
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.08);
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
        }

        .color-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s;
        }

        .color-circle:hover {
            transform: scale(1.2);
            border-color: white;
        }

        /* List Styling */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card-item {
            background: #ffffff;
            padding: 25px 32px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            gap: 30px;
            border: 1px solid var(--border);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card-item:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
        }

        .item-thumb {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            object-fit: cover;
            border: 1px solid var(--border);
        }

        .item-details {
            flex: 1;
        }

        .item-heading {
            font-weight: 700;
            color: var(--text-main);
            font-size: 18px;
            margin-bottom: 8px;
        }

        /* Login Screen */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-card {
            background: white;
            padding: 48px;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .login-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .login-title {
            font-size: 24px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .login-desc {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 32px;
        }

        .login-input-group {
            text-align: left;
            margin-bottom: 24px;
        }

        .error-msg {
            color: #ef4444;
            font-size: 13px;
            font-weight: 600;
            margin-top: 8px;
            display: block;
        }

        .badge-pill {
            background: #f1f5f9;
            color: #475569;
            padding: 5px 14px;
            border-radius: 12px;
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 800;
        }

        .item-time-box {
            text-align: right;
            margin-right: 25px;
        }

        .d-text {
            display: block;
            font-size: 13px;
            font-weight: 800;
            color: var(--text-main);
        }

        .t-text {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .action-group {
            display: flex;
            gap: 12px;
        }

        .btn-action-circle {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }

        .btn-del {
            background: rgba(239, 68, 68, 0.08);
            color: #ef4444;
        }

        .btn-del:hover {
            background: #ef4444;
            color: white;
            transform: rotate(8deg);
        }

        .btn-expand {
            background: #f1f5f9;
            color: #64748b;
        }

        .btn-edit {
            background: #eff6ff;
            color: var(--primary);
        }

        .btn-edit:hover {
            background: var(--primary);
            color: white;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icons = {
            Articles: () => <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="22" height="22"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10l4 4v10a2 2 0 0 1-2 2z"></path><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>,
            Categories: () => <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="22" height="22"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>,
            Home: () => <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="22" height="22"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>,
            Plus: () => <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 6v12m6-6H6"></path></svg>,
            Trash: () => <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>,
            Bold: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path></svg>,
            Italic: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="4" x2="10" y2="4"></line><line x1="14" y1="20" x2="5" y2="20"></line><line x1="15" y1="4" x2="9" y2="20"></line></svg>,
            X: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            ChevronDown: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>,
            Edit: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>,
            Download: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg>,
            News: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10l4 4v10a2 2 0 0 1-2 2z"></path><path d="M16 13H8M16 17H8M10 9H8"></path></svg>,
            Link: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
        };

        const TEN_COLORS = ['#000000', '#64748b', '#2563eb', '#ef4444', '#10b981', '#14b8a6', '#f59e0b', '#f97316', '#8b5cf6', '#ec4899'];

        function ParagraphInput({ initialValue, index, onChange, onRemove }) {
            const inputRef = useRef(null);
            useEffect(() => { if (inputRef.current) inputRef.current.innerHTML = initialValue || ''; }, [initialValue]);
            return (
                <div className="content-block">
                    <div className="block-header">
                        <span className="block-tag">Section {index + 1}</span>
                        <button className="modal-close-btn" style={{ width: '32px', height: '32px', position: 'static' }} onClick={onRemove}><Icons.X /></button>
                    </div>
                    <div ref={inputRef} contentEditable className="rich-editor" onBlur={() => onChange(inputRef.current.innerHTML)} suppressContentEditableWarning={true} />
                </div>
            );
        }

        function AdminPanel() {
            const [isAuthenticated, setIsAuthenticated] = useState(sessionStorage.getItem('adminAuth') === 'true');
            const [inputPassword, setInputPassword] = useState('');

                                                    }

                                                style={{ padding: '6px 10px', fontSize: '11px', background: 'white', border: '1px solid #e2e8f0', borderRadius: '6px', cursor: 'pointer', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}
                                            >
                                                {art.heading}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminPanel />);
    </script>
</body>

</html>
