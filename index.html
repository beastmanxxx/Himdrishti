        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.2);
        }

        /* Comment Section Styles */
        .comment-section {
            margin-top: 32px;
            border-top: 1px solid rgba(59, 130, 246, 0.12);
            padding-top: 28px;
            animation: fadeInUp 0.4s ease;
        }

        .comment-section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .comment-section-header h3 {
            font-size: 20px;
            font-weight: 700;
            color: #1f2937;
        }

        .comment-count-badge {
            background: rgba(59, 130, 246, 0.1);
            color: #2563eb;
            font-size: 12px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .comment-input-box {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 28px;
            padding: 16px;
            background: rgba(59, 130, 246, 0.04);
            border: 1px solid rgba(59, 130, 246, 0.12);
            border-radius: 14px;
            transition: border-color 0.3s ease;
        }

        .comment-input-box:focus-within {
            border-color: rgba(59, 130, 246, 0.35);
            background: rgba(59, 130, 246, 0.06);
        }

        .comment-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(59, 130, 246, 0.2);
            flex-shrink: 0;
            object-fit: cover;
        }

        .comment-avatar-placeholder {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .comment-input-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .comment-textarea {
            width: 100%;
            min-height: 50px;
            max-height: 150px;
            padding: 10px 14px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #1f2937;
            background: white;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .comment-textarea:focus {
            border-color: #3b82f6;
        }

        .comment-textarea::placeholder {
            color: #9ca3af;
        }

        .comment-submit-btn {
            align-self: flex-end;
            padding: 8px 22px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            transition: all 0.3s ease;
        }

        .comment-submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.3);
        }

        .comment-submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .comment-item {
            display: flex;
            gap: 12px;
            padding: 16px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            animation: fadeInUp 0.3s ease;
        }

        .comment-item:last-child {
            border-bottom: none;
        }

        .comment-body {
            flex: 1;
        }

        .comment-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .comment-author {
            font-size: 13px;
            font-weight: 700;
            color: #1f2937;
        }

        .comment-time {
            font-size: 11px;
            color: #9ca3af;
            font-weight: 500;
        }

        .comment-text {
            font-size: 14px;
            color: #4b5563;
            line-height: 1.6;
            word-break: break-word;
        }

        .comment-empty {
            text-align: center;
            padding: 32px 16px;
            color: #9ca3af;
            font-size: 14px;
        }

        .comment-empty svg {
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .comment-login-prompt {
            text-align: center;
            padding: 20px;
            background: rgba(59, 130, 246, 0.06);
            border: 1px dashed rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .comment-login-prompt p {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .comment-login-btn {
            padding: 8px 24px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            transition: all 0.3s ease;
        }

        .comment-login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Icons as simple SVG components
        const Icons = {
            Home: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></svg>,
            Dashboard: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" /><rect x="14" y="14" width="7" height="7" /><rect x="3" y="14" width="7" height="7" /></svg>,
            Users: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg>,
            Settings: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>,
            Chart: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10" /><line x1="12" y1="20" x2="12" y2="4" /><line x1="6" y1="20" x2="6" y2="14" /></svg>,
            File: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" /><polyline points="13 2 13 9 20 9" /></svg>,
            Bell: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" /><path d="M13.73 21a2 2 0 0 1-3.46 0" /></svg>,
            Search: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>,
            Mail: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" /><polyline points="22,6 12,13 2,6" /></svg>,
            HelpCircle: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" /><line x1="12" y1="17" x2="12.01" y2="17" /></svg>,
        };

        const ARTICLES_DATA = [
            {
                id: 1,
                title: 'How to Crack UPSC in First Attempt',
                category: 'UPSC',
                date: 'May 2, 2026',
                readTime: '5 min read',
                color: '#3b82f6',
                content: [
                    'Cracking the UPSC Civil Services Examination in the first attempt requires a strategic approach, disciplined study routine, and smart work. This comprehensive guide will help you understand the key aspects of preparing for one of India\'s toughest examinations.',
                    'The first step towards UPSC success is understanding the exam pattern thoroughly. The examination consists of three stages: Preliminary Examination (Objective Type), Main Examination (Descriptive Type), and Personality Test (Interview). Each stage requires different preparation strategies and skill sets.',
                    'Time management is crucial for UPSC preparation. Create a realistic study schedule that covers all subjects while allowing time for revision and current affairs. Dedicate at least 6-8 hours daily for focused study, with regular breaks to maintain productivity.',
                    'NCERT books form the foundation of UPSC preparation. Start with NCERTs from classes 6-12 for History, Geography, Economics, and Political Science. These books provide conceptual clarity that is essential for answering both prelims and mains questions effectively.',
                    'Current affairs play a vital role in all three stages of UPSC. Read newspapers daily, preferably The Hindu or Indian Express. Make notes of important events, government schemes, international relations, and economic developments. Review these notes regularly.'
                ]
            },
            {
                id: 2,
                title: 'Understanding Indian Polity for Prelims',
                category: 'Polity',
                date: 'Apr 28, 2026',
                readTime: '7 min read',
                color: '#2563eb',
                content: [
                    'Indian Polity is a crucial subject for UPSC Prelims and forms the foundation for understanding governance in India. The Constitution of India, adopted on January 26, 1950, is the supreme law of the land and the longest written constitution in the world.',
                    'The Preamble to the Constitution declares India as a Sovereign, Socialist, Secular, Democratic Republic. It ensures Justice (social, economic, and political), Liberty (of thought, expression, belief, faith, and worship), Equality (of status and opportunity), and Fraternity.',
                    'The Constitution provides for a parliamentary form of government with a federal structure. The President is the constitutional head of the executive, while the Prime Minister is the real head. The Parliament consists of the President, Lok Sabha, and Rajya Sabha.',
                    'The Supreme Court stands at the apex of the judicial system in India. It has original, appellate, and advisory jurisdiction. The concept of Judicial Review empowers the Supreme Court to examine the constitutional validity of legislative enactments and executive orders.',
                    'Fundamental Rights enshrined in Part III of the Constitution are justiciable and protect citizens against arbitrary state action. These include Right to Equality, Right to Freedom, Right against Exploitation, Right to Freedom of Religion, Cultural and Educational Rights, and Right to Constitutional Remedies.'
                ]
            },
            {
                id: 3,
                title: 'Geography: Key Map Points to Remember',
                category: 'Geography',
                date: 'Apr 25, 2026',
                readTime: '4 min read',
                color: '#60a5fa',
                content: [
                    'Geography for UPSC requires thorough understanding of both physical and human geography. Map-based questions are increasingly important in both Prelims and Mains examinations. Focus on major physical features, rivers, mountain ranges, and strategic locations.',
                    'The Himalayas, the youngest mountain range in the world, stretches across the northern boundary of India. It consists of three parallel ranges: the Greater Himalayas (Himadri), Lesser Himalayas (Himachal), and Outer Himalayas (Shivalik). These ranges influence India\'s climate and drainage systems.',
                    'The Indian River System is divided into Himalayan rivers and Peninsular rivers. The Ganga, Brahmaputra, and Indus systems originate from the Himalayas. The Godavari, Krishna, Kaveri, and Mahanadi are major peninsular rivers. Understanding their courses and tributaries is essential.',
                    'India\'s climate is dominated by the monsoon system. The Southwest Monsoon brings rain from June to September, while the Northeast Monsoon affects parts of South India from October to December. Climate change impacts and disaster management are important contemporary topics.',
                    'Natural vegetation in India varies from tropical evergreen forests in the Western Ghats and Northeast to thorn forests in Rajasthan. Biosphere reserves and wildlife sanctuaries across different biogeographic zones require special attention for conservation-related questions.'
                ]
            },
            {
                id: 4,
                title: 'Economic Survey 2026: Highlights & Analysis',
                category: 'Economy',
                date: 'Apr 20, 2026',
                readTime: '8 min read',
                color: '#1d4ed8',
                content: [
                    'The Economic Survey 2026 presents a comprehensive overview of India\'s economic performance during the fiscal year 2025-26. The survey highlights robust GDP growth, controlled inflation, and significant progress in various sectors of the economy.',
                    'India\'s GDP growth rate stood at 7.2% for FY 2025-26, making it one of the fastest-growing major economies globally. The manufacturing sector showed resilience with 8.5% growth, while the services sector continued to be the growth engine at 8.8%.',
                    'Inflation management has been a key achievement, with CPI inflation averaging 4.8% within the RBI\'s target range. Food inflation saw moderation due to improved supply chain management and agricultural reforms. Core inflation remained stable at 3.2%.',
                    'The fiscal deficit is estimated at 5.1% of GDP, showing improvement from the previous year. Revenue collection exceeded targets through improved GST compliance and direct tax buoyancy. Capital expenditure on infrastructure reached record levels.',
                    'Key reforms highlighted include the National Logistics Policy implementation, Production Linked Incentive (PLI) scheme expansion, and digital payment ecosystem growth. The survey emphasizes the need for continued focus on employment generation and skill development.'
                ]
            },
            {
                id: 5,
                title: 'Environment & Ecology: Current Affairs Digest',
                category: 'Environment',
                date: 'Apr 18, 2026',
                readTime: '6 min read',
                color: '#3b82f6',
                content: [
                    'Environmental conservation and sustainable development have become critical areas for UPSC preparation. Recent developments in climate change policies, biodiversity conservation, and renewable energy initiatives are frequently asked in examinations.',
                    'The United Nations Climate Change Conference (COP) outcomes significantly impact India\'s climate commitments. India aims to achieve net-zero emissions by 2070 while increasing non-fossil energy capacity to 500 GW by 2030. The National Action Plan on Climate Change (NAPCC) comprises eight missions.',
                    'Biodiversity hotspots in India include the Western Ghats, Eastern Himalayas, and Indo-Burma region. The Biological Diversity Act, 2002 implements the Convention on Biological Diversity. India has 18 biosphere reserves and over 1000 wildlife sanctuaries and national parks.',
                    'Pollution control measures have gained momentum with the National Clean Air Programme (NCAP) targeting 132 non-attainment cities. The Commission for Air Quality management (CAQM) in National Capital Region and adjoining areas has been constituted for better coordination.',
                    'Waste management initiatives include the Swachh Bharat Mission 2.0 focusing on solid waste management and single-use plastic ban implementation. The Plastic Waste Management Rules, 2016 mandate extended producer responsibility for plastic packaging waste management.'
                ]
            },
            {
                id: 6,
                title: 'History of Modern India: Timeline Approach',
                category: 'History',
                date: 'Apr 15, 2026',
                readTime: '10 min read',
                color: '#2563eb',
                content: [
                    'Modern Indian History spans from the mid-18th century to India\'s independence in 1947. Understanding the chronological sequence of events helps in comprehending the evolution of British rule and the freedom struggle.',
                    'The Battle of Plassey (1757) marked the beginning of British political control in India. The East India Company gradually expanded its territories through subsidiary alliances, doctrine of lapse, and direct military conquests. The Revolt of 1857 led to the transfer of power from Company to Crown.',
                    'The Indian National Congress was founded in 1885 by A.O. Hume, with early leaders like Dadabhai Naoroji, Surendranath Banerjee, and Gopal Krishna Gokhale demanding administrative reforms and greater Indian participation in governance.',
                    'The Gandhian era (1915-1947) transformed the freedom movement with mass participation. Non-Cooperation Movement (1920-22), Civil Disobedience Movement (1930-34), and Quit India Movement (1942) were major milestones. The Satyagraha technique became a powerful tool for resistance.',
                    'The final phase (1945-47) saw the Cabinet Mission Plan, direct action day, partition violence, and eventual independence with the Indian Independence Act, 1947. Understanding the communal politics and the two-nation theory is essential for analyzing this period.'
                ]
            }
        ];

        function Navbar({ rightSidebarOpen, setRightSidebarOpen, onArticlesClick, onHomeClick, onAboutClick, onCoursesClick, onTestSeriesClick, onDownloadsClick, currentView, user, onSignIn, onSignOut }) {
            const activeLink = currentView === 'about' ? 'About' : currentView === 'courses' ? 'Courses' : currentView === 'test-series' ? 'Test Series' : currentView === 'test-series-detail' ? 'Test Series' : currentView === 'downloads' ? 'Downloads' : (currentView === 'articles' || currentView === 'article') ? 'Articles / Blog' : 'Home';
            const [menuOpen, setMenuOpen] = useState(false);
            const menuRef = React.useRef(null);
            const btnRef = React.useRef(null);
            const rightBtnRef = React.useRef(null);
            const links = ['Home', 'Courses', 'Test Series', 'About', 'Articles / Blog', 'Downloads'];

            const handleLinkClick = (link) => {
                setMenuOpen(false);
                if (link === 'Articles / Blog' && onArticlesClick) {
                    onArticlesClick();
                } else if (link === 'Home' && onHomeClick) {
                    onHomeClick();
                } else if (link === 'About' && onAboutClick) {
                    onAboutClick();
                } else if (link === 'Courses' && onCoursesClick) {
                    onCoursesClick();
                } else if (link === 'Downloads' && onDownloadsClick) {
                    onDownloadsClick();
                } else if (link === 'Test Series' && onTestSeriesClick) {
                    onTestSeriesClick();
                }
            };

            useEffect(() => {
                const handleClickOutside = (e) => {
                    if (menuOpen && menuRef.current && btnRef.current &&
                        !menuRef.current.contains(e.target) &&
                        !btnRef.current.contains(e.target)) {
                        setMenuOpen(false);
                    }
                    if (rightSidebarOpen && rightBtnRef.current &&
                        !rightBtnRef.current.contains(e.target) &&
                        !e.target.closest('.sidebar-right') &&
                        !e.target.closest('.sidebar-right-overlay')) {
                        setRightSidebarOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, [menuOpen, rightSidebarOpen]);

            return (
                <>
                    <nav className="navbar">
                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                            <button ref={btnRef} className={`hamburger-btn ${menuOpen ? 'open' : ''}`} onClick={() => setMenuOpen(!menuOpen)}>
                                <span className="hamburger-line"></span>
                                <span className="hamburger-line"></span>
                                <span className="hamburger-line"></span>
                            </button>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                <div className="navbar-logo-circle">
                                    <img src="logo.png" alt="Himdrishti Logo" />
                                </div>
                                <div className="navbar-logo">Himdrishti</div>
                            </div>
                            <div className="running-text">
                                <span style={{ color: '#4b5563', fontSize: '12px' }}>
                                    ✨ Empowering Vision Through Technology — Himdrishti Platform ✨
                                </span>
                            </div>
                        </div>
                        <div className="navbar-links">
                            {links.map(link => (
                                <a
                                    key={link}
                                    className={`nav-link ${activeLink === link ? 'nav-link-active' : ''}`}
                                    onClick={() => handleLinkClick(link)}
                                >
                                    {link}
                                </a>
                            ))}
                        </div>
                        <div className="navbar-actions">
                            <div style={{ position: 'relative', cursor: 'pointer', color: '#6b7280', transition: 'color 0.3s' }}
                                onMouseEnter={e => e.currentTarget.style.color = '#2563eb'}
                                onMouseLeave={e => e.currentTarget.style.color = '#6b7280'}>
                                <Icons.Bell />
                                <div style={{
                                    position: 'absolute', top: -2, right: -2, width: 8, height: 8,
                                    borderRadius: '50%', background: '#3b82f6', border: '2px solid #ffffff'
                                }}></div>
                            </div>

                            {user ? (
                                <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
                                    {user.email === 'himdrishti.adm@gmail.com' && (
                                        <button
                                            className="nav-btn nav-btn-primary"
                                            style={{ padding: '8px 18px', fontSize: '13px', height: '38px', background: '#0f172a' }}
                                            onClick={() => window.open('admin.html', '_blank')}
                                        >
                                            Admin Panel
                                        </button>
                                    )}
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '10px', padding: '4px 10px', borderRadius: '30px', background: 'rgba(59, 130, 246, 0.05)', border: '1px solid rgba(59, 130, 246, 0.1)' }}>
                                        <img
                                            src={user.photoURL}
                                            alt="Profile"
                                            style={{ width: '28px', height: '28px', borderRadius: '50%', border: '1.5px solid #2563eb' }}
                                        />
                                        <div className="user-info-text">
                                            <div style={{ fontSize: '13px', fontWeight: 700, color: '#1f2937' }}>{user.displayName}</div>
                                        </div>
                                    </div>
                                    <button className="nav-btn nav-btn-outline" onClick={onSignOut} style={{ padding: '8px 18px', fontSize: '13px', height: '38px' }}>Logout</button>
                                </div>
                            ) : (
                                <>
                                    <button className="nav-btn nav-btn-outline" onClick={onSignIn}>Sign In</button>
                                    <button className="nav-btn nav-btn-primary" onClick={onSignIn}>Get Started</button>
                                </>
                            )}
                            <button ref={rightBtnRef} className={`hamburger-btn-right ${rightSidebarOpen ? 'open' : ''}`} onClick={() => setRightSidebarOpen(!rightSidebarOpen)} title="Toggle Right Sidebar">
                                <span className="hamburger-line"></span>
                                <span className="hamburger-line"></span>
                                <span className="hamburger-line"></span>
                            </button>
                        </div>
                    </nav>
                    <div ref={menuRef} className={`mobile-menu ${menuOpen ? 'open' : ''}`}>
                        {links.map(link => (
                            <a
                                key={link}
                                className={`mobile-menu-link ${activeLink === link ? 'mobile-menu-link-active' : ''}`}
                                onClick={() => handleLinkClick(link)}
                            >
                                {link}
                            </a>
                        ))}
                        <div className="mobile-menu-actions">
                            {user ? (
                                <div style={{ width: '100%', display: 'flex', alignItems: 'center', gap: '12px', padding: '10px' }}>
                                    <img src={user.photoURL} style={{ width: '40px', height: '40px', borderRadius: '50%' }} />
                                    <div style={{ flex: 1 }}>
                                        <div style={{ fontSize: '14px', fontWeight: 700 }}>{user.displayName}</div>
                                        <div style={{ fontSize: '12px', color: '#6b7280' }}>{user.email}</div>
                                    </div>
                                    <button className="nav-btn nav-btn-outline" onClick={onSignOut} style={{ padding: '6px 12px' }}>Logout</button>
                                </div>
                            ) : (
                                <>
                                    <button className="nav-btn nav-btn-outline" onClick={onSignIn} style={{ flex: 1 }}>Sign In</button>
                                    <button className="nav-btn nav-btn-primary" onClick={onSignIn} style={{ flex: 1 }}>Get Started</button>
                                </>
                            )}
                        </div>
                    </div>
                </>
            );
        }

        function LeftSidebarContent({ sidebarResources = [], sidebarDownloads = [], testSeries = [], onSeriesSelect, currentView, selectedTestSeries }) {
            return (
                <>
                    {sidebarResources.length > 0 && (
                        <>
                            <div className="sidebar-section-title">Quick Resources</div>
                            {sidebarResources.map(res => (

        function ArticleView({ article, onBack, user, onSignIn }) {
            const [showComments, setShowComments] = useState(false);
            const [commentText, setCommentText] = useState('');
            const [comments, setComments] = useState([]);
            const [submitting, setSubmitting] = useState(false);
            const commentSectionRef = useRef(null);

            // Load comments from Firebase in real-time
            useEffect(() => {
                if (window.firebaseDB && article.id) {
                    const { db, collection, onSnapshot, query, orderBy, doc } = window.firebaseDB;
                    const commentsRef = collection(doc(collection(db, 'articles'), article.id), 'comments');
                    const q = query(commentsRef, orderBy('createdAt', 'desc'));
                    const unsubscribe = onSnapshot(q, (snapshot) => {
                        const fetched = snapshot.docs.map(d => {
                            const data = d.data();
                            let timeStr = '';
                            if (data.createdAt) {
                                const date = data.createdAt.toDate ? data.createdAt.toDate() : new Date(data.createdAt);
                                timeStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + ' at ' + date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                            }
                            return {
                                id: d.id,
                                text: data.text,
                                userName: data.userName || 'Anonymous',
                                userPhoto: data.userPhoto || null,
                                time: timeStr
                            };
                        });
                        setComments(fetched);
                    });
                    return () => unsubscribe();
                }
            }, [article.id]);

            const handleSubmitComment = async () => {
                if (!commentText.trim() || !user || !window.firebaseDB) return;
                setSubmitting(true);
                try {
                    const { db, collection, addDoc, serverTimestamp, doc: fbDoc } = window.firebaseDB;
                    const commentsRef = collection(fbDoc(collection(db, 'articles'), article.id), 'comments');
                    await addDoc(commentsRef, {
                        text: commentText.trim(),
                        userName: user.displayName || 'User',
                        userPhoto: user.photoURL || null,
                        userEmail: user.email,
                        createdAt: serverTimestamp()
                    });
                    setCommentText('');
                } catch (err) {
                    console.error('Error posting comment:', err);
                }
                setSubmitting(false);
            };

            const [copied, setCopied] = useState(false);

            const handleShare = () => {
                const articleUrl = `${window.location.origin}${window.location.pathname}?article=${article.id}`;
                if (navigator.share) {
                    navigator.share({ title: article.title, text: article.title, url: articleUrl });
                } else {
                    navigator.clipboard.writeText(articleUrl).then(() => {
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2500);
                    });
                }
            };

            const toggleComments = () => {
                setShowComments(!showComments);
                if (!showComments) {
                    setTimeout(() => {
                        commentSectionRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 100);
                }
            };

            return (
                <div className="center-content" style={{ padding: '40px', maxWidth: '800px', margin: '0 auto', overflowY: 'auto', display: 'block' }}>
                    <button
                        onClick={onBack}
                        className="cta-btn cta-secondary"
                        style={{ marginBottom: '20px', display: 'flex', alignItems: 'center', gap: '8px' }}
                    >
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                            <path d="M19 12H5M12 19l-7-7 7-7" />
                        </svg>
                        Back to Articles
                    </button>

                    <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '24px' }}>
                        <span style={{
                            fontSize: '12px', fontWeight: 600, padding: '4px 12px',
                            borderRadius: '6px', background: `${article.color}20`, color: article.color,
                            textTransform: 'uppercase', letterSpacing: '0.5px',
                        }}>
                            {article.category}
                        </span>
                        <span style={{ fontSize: '12px', color: '#6b7280' }}>{article.date}</span>
                        <span style={{ fontSize: '12px', color: '#6b7280' }}>{article.readTime}</span>
                    </div>

                    <h1 style={{ fontSize: '32px', fontWeight: '800', color: '#1f2937', marginBottom: '20px', lineHeight: '1.2' }}>
                        {article.title}
                    </h1>

                    <div style={{ fontSize: '16px', lineHeight: '1.7', color: '#4b5563', marginBottom: '20px' }}>
                        {/* Legacy Image/Video Support (for articles created before the dynamic system) */}
                        {article.imageLink && (!article.content || article.content.length === 0) && (() => {
                            const ytMatch = article.imageLink.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]{11})/);
                            if (ytMatch) {
                                return (
                                    <div style={{ position: 'relative', width: '100%', paddingBottom: '56.25%', height: 0, borderRadius: '16px', overflow: 'hidden', marginBottom: '24px', background: '#000' }}>
                                        <iframe
                                            src={`https://www.youtube.com/embed/${ytMatch[1]}?rel=0`}
                                            title={article.title}
                                            frameBorder="0"
                                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                            allowFullScreen
                                            style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%' }}
                                        />
                                    </div>
                                );
                            } else {
                                return <img src={article.imageLink} style={{ width: '100%', borderRadius: '16px', marginBottom: '24px' }} alt={article.title} />;
                            }
                        })()}

                        {/* Render Dynamic Content Blocks */}
                        {article.content && article.content.map((item, idx) => {
                            // Support legacy string paragraphs
                            if (typeof item === 'string') {
                                return <p key={idx} style={{ marginBottom: '16px' }} dangerouslySetInnerHTML={{ __html: item }} />;
                            }

                            // Dynamic Blocks
                            if (item.type === 'paragraph') {
                                return <p key={idx} style={{ marginBottom: '16px' }} dangerouslySetInnerHTML={{ __html: item.value }} />;
                            }
                            if (item.type === 'image' && item.value) {
                                return <img key={idx} src={item.value} style={{ width: '100%', borderRadius: '16px', marginBottom: '24px' }} alt="Article Media" />;
                            }
                            if (item.type === 'video' && item.value) {
                                const ytMatch = item.value.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]{11})/);
                                if (ytMatch) {
                                    return (
                                        <div key={idx} style={{ position: 'relative', width: '100%', paddingBottom: '56.25%', height: 0, borderRadius: '16px', overflow: 'hidden', marginBottom: '24px', background: '#000' }}>
                                            <iframe
                                                src={`https://www.youtube.com/embed/${ytMatch[1]}?rel=0`}
                                                frameBorder="0"
                                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                                allowFullScreen
                                                style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%' }}
                                            />
                                        </div>
                                    );
                                }
                            }
                            if (item.type === 'download' && item.value) {
                                return (
                                    <div key={idx} style={{ textAlign: 'center', margin: '24px 0', padding: '24px', background: 'rgba(59, 130, 246, 0.04)', borderRadius: '16px', border: '1px dashed rgba(59, 130, 246, 0.3)' }}>
                                        <h4 style={{ fontSize: '17px', fontWeight: '700', color: '#1f2937', marginBottom: '12px' }}>{item.label || 'Attached Resource'}</h4>
                                        <button className="cta-btn cta-primary" onClick={() => window.open(item.value, '_blank')} style={{ padding: '10px 28px', fontSize: '14px', borderRadius: '50px' }}>
                                            Download
                                        </button>
                                    </div>
                                );
                            }
                            return null;
                        })}

                        {/* Fallback for legacy paragraphs field if content is missing */}
                        {!article.content && article.paragraphs && article.paragraphs.map((p, idx) => (
                            <p key={idx} style={{ marginBottom: '16px' }} dangerouslySetInnerHTML={{ __html: p }} />
                        ))}
                    </div>

                    {/* Comment & Share Buttons */}
                    <div style={{ display: 'flex', gap: '12px', marginTop: '32px', alignItems: 'center', flexWrap: 'wrap' }}>
                        <button className="cta-btn cta-primary" onClick={toggleComments} style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                            </svg>
                            Comment {comments.length > 0 && `(${comments.length})`}
                        </button>
                        <button className="cta-btn cta-secondary" onClick={handleShare} style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <circle cx="18" cy="5" r="3" />
                                <circle cx="6" cy="12" r="3" />
                                <circle cx="18" cy="19" r="3" />
                                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
                            </svg>
                            {copied ? '✓ Link Copied!' : 'Share'}
                        </button>
                        {copied && (
                            <span style={{ fontSize: '12px', color: '#10b981', fontWeight: 600, animation: 'fadeInUp 0.3s ease' }}>
                                Article link copied to clipboard!
                            </span>
                        )}
                    </div>

                    {/* Comment Section */}
                    {showComments && (
                        <div className="comment-section" ref={commentSectionRef}>
                            <div className="comment-section-header">
                                <h3>Comments</h3>
                                <span className="comment-count-badge">{comments.length}</span>
                            </div>

                            {/* Comment Input */}
                            {user ? (
                                <div className="comment-input-box">
                                    <img src={user.photoURL} alt="You" className="comment-avatar" />
                                    <div className="comment-input-wrapper">
                                        <textarea
                                            className="comment-textarea"
                                            placeholder="Write your comment..."
                                            value={commentText}
                                            onChange={(e) => setCommentText(e.target.value)}
                                            onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSubmitComment(); } }}
                                        />
                                        <button
                                            className="comment-submit-btn"
                                            onClick={handleSubmitComment}
                                            disabled={!commentText.trim() || submitting}
                                        >
                                            {submitting ? 'Posting...' : 'Post Comment'}
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div className="comment-login-prompt">
                                    <p>Sign in to join the conversation</p>
                                    <button className="comment-login-btn" onClick={onSignIn}>Sign In with Google</button>
                                </div>
                            )}

                            {/* Comment List */}
                            <div className="comment-list">
                                {comments.length === 0 ? (
                                    <div className="comment-empty">
                                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                                        </svg>
                                        <p>No comments yet. Be the first to share your thoughts!</p>
                                    </div>
                                ) : (
                                    comments.map(c => (
                                        <div key={c.id} className="comment-item">
                                            {c.userPhoto ? (
                                                <img src={c.userPhoto} alt={c.userName} className="comment-avatar" />
                                            ) : (
                                                <div className="comment-avatar-placeholder">
                                                    {c.userName.charAt(0).toUpperCase()}
                                                </div>
                                            )}
                                            <div className="comment-body">
                                                <div className="comment-meta">
                                                    <span className="comment-author">{c.userName}</span>
                                                    <span className="comment-time">{c.time}</span>
                                                </div>
                                                <div className="comment-text">{c.text}</div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

                        {affair.heading}
                    </h1>

                    <div style={{ fontSize: '16px', lineHeight: '1.7', color: '#4b5563', marginBottom: '20px' }}>
                        {/* Summary Block */}
                        {affair.description && (
                            <p style={{ marginBottom: '20px', fontWeight: '600', color: '#374151' }}>{affair.description}</p>
                        )}

                        {/* Content Blocks */}
                        {affair.content && affair.content.map((item, idx) => {
                            if (item.type === 'paragraph') {
                                return <p key={idx} style={{ marginBottom: '16px' }} dangerouslySetInnerHTML={{ __html: item.value }} />;
                            }
                            if (item.type === 'image' && item.value) {
                                return <img key={idx} src={item.value} style={{ width: '100%', borderRadius: '16px', marginBottom: '24px' }} alt="News Media" />;
                            }
                            if (item.type === 'video' && item.value) {
                                const ytMatch = item.value.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]{11})/);
                                if (ytMatch) {
                                    return (
                                        <div key={idx} style={{ position: 'relative', width: '100%', paddingBottom: '56.25%', height: 0, borderRadius: '16px', overflow: 'hidden', marginBottom: '24px', background: '#000' }}>
                                            <iframe src={`https://www.youtube.com/embed/${ytMatch[1]}?rel=0`} frameBorder="0" allowFullScreen style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%' }} />
                                        </div>
                                    );
                                }
                            }
                            if (item.type === 'download' && item.value) {
                                return (
                                    <div key={idx} style={{ textAlign: 'center', margin: '24px 0', padding: '24px', background: 'rgba(37, 99, 235, 0.04)', borderRadius: '16px', border: '1px dashed rgba(37, 99, 235, 0.3)' }}>
                                        <h4 style={{ fontSize: '17px', fontWeight: '700', color: '#1f2937', marginBottom: '12px' }}>{item.label || 'Attached Resource'}</h4>
                                        <button className="cta-btn cta-primary" onClick={() => window.open(item.value, '_blank')} style={{ padding: '10px 28px', fontSize: '14px', borderRadius: '50px' }}>
                                            Download
                                        </button>
                                    </div>
                                );
                            }
                            return null;
                        })}
                    </div>

                    {/* Comment & Share Buttons */}
                    <div style={{ display: 'flex', gap: '12px', marginTop: '32px', alignItems: 'center', flexWrap: 'wrap' }}>
                        <button className="cta-btn cta-primary" onClick={() => setShowComments(!showComments)} style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                            </svg>
                            Comment {comments.length > 0 && `(${comments.length})`}
                        </button>
                        <button className="cta-btn cta-secondary" onClick={handleShare} style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <circle cx="18" cy="5" r="3" />
                                <circle cx="6" cy="12" r="3" />
                                <circle cx="18" cy="19" r="3" />
                                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
                            </svg>
                            {copied ? '✓ Link Copied!' : 'Share'}
                        </button>
                        {copied && (
                            <span style={{ fontSize: '12px', color: '#10b981', fontWeight: 600 }}>
                                Update link copied to clipboard!
                            </span>
                        )}
                    </div>

                    {/* Comment Section */}
                    {showComments && (
                        <div className="comment-section" ref={commentSectionRef}>
                            <div className="comment-section-header">
                                <h3>Comments</h3>
                                <span className="comment-count-badge">{comments.length}</span>
                            </div>

                            {/* Comment Input */}
                            {user ? (
                                <div className="comment-input-box">
                                    {user.photoURL ? (
                                        <img src={user.photoURL} alt="You" className="comment-avatar" />
                                    ) : (
                                        <div className="comment-avatar-placeholder">{user.displayName ? user.displayName.charAt(0).toUpperCase() : 'U'}</div>
                                    )}
                                    <div className="comment-input-wrapper">
                                        <textarea
                                            className="comment-textarea"
                                            placeholder="Write your comment..."
                                            value={commentText}
                                            onChange={(e) => setCommentText(e.target.value)}
                                            onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSubmitComment(); } }}
                                        />
                                        <button
                                            className="comment-submit-btn"
                                            onClick={handleSubmitComment}
                                            disabled={!commentText.trim() || submitting}
                                        >
                                            {submitting ? 'Posting...' : 'Post Comment'}
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div className="comment-login-prompt">
                                    <p>Sign in to join the conversation</p>
                                    <button className="comment-login-btn" onClick={onSignIn}>Sign In with Google</button>
                                </div>
                            )}

                            {/* Comment List */}
                            <div className="comment-list">
                                {comments.length === 0 ? (
                                    <div className="comment-empty">
                                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                                        </svg>
                                        <p>No comments yet. Be the first to share your thoughts!</p>
                                    </div>
                                ) : (
                                    comments.map(c => (
                                        <div key={c.id} className="comment-item">
                                            {c.userPhoto ? (
                                                <img src={c.userPhoto} alt={c.userName} className="comment-avatar" />
                                            ) : (
                                                <div className="comment-avatar-placeholder">
                                                    {c.userName ? c.userName.charAt(0).toUpperCase() : 'U'}
                                                </div>
                                            )}
                                            <div className="comment-body">
                                                <div className="comment-meta">
                                                    <span className="comment-author">{c.userName}</span>
                                                    <span className="comment-time">{c.time}</span>
                                                </div>
                                                <div className="comment-text">{c.text}</div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function ArticlesPage({ articles = [], onArticleSelect, filteredCategory }) {
            return (
                <div className="center-content" style={{ padding: '30px', overflowY: 'auto', alignItems: 'flex-start', justifyContent: 'flex-start' }}>
                    <div style={{ maxWidth: '800px', width: '100%', margin: '0 auto' }}>
                        <div style={{ marginBottom: '32px' }}>
                            <h1 style={{ fontSize: '28px', fontWeight: '800', color: '#1f2937', marginBottom: '8px' }}>
                                {filteredCategory || 'Articles & Blogs'}
                            </h1>
                            <p style={{ fontSize: '14px', color: '#6b7280' }}>
                                {filteredCategory ? `Browse all updates and materials for ${filteredCategory}` : 'Comprehensive study materials for UPSC preparation'}
                            </p>
                        </div>

                        <div style={{ display: 'flex', flexDirection: 'column', gap: '24px' }}>
                            {articles.map((article) => (
                                <div
                                    key={article.id}
                                    className="right-card"
                                    style={{
                                        padding: '24px', cursor: 'pointer'
                                    }}
                                    onClick={() => onArticleSelect(article)}
                                >
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '16px' }}>
                                        <span style={{
                                            fontSize: '12px', fontWeight: 600, padding: '4px 10px',
                                            borderRadius: '6px', background: `${article.color}15`, color: article.color,
                                            textTransform: 'uppercase', letterSpacing: '0.5px',
                                        }}>
                                            {article.category}
                                        </span>
                                        <span style={{ fontSize: '12px', color: '#6b7280' }}>{article.readTime}</span>
                                        <span style={{ fontSize: '12px', color: '#4b5563', marginLeft: 'auto' }}>{article.date}</span>
                                    </div>

                                    <h2 style={{
                                        fontSize: '20px',
                                        fontWeight: '700',
                                        color: '#1f2937',
                                        marginBottom: '16px',
                                        lineHeight: '1.3'
                                    }}>
                                        {article.title}
                                    </h2>

                                    <div style={{ fontSize: '14px', lineHeight: '1.8', color: '#4b5563' }}>
                                        {(() => {
                                            const firstPara = article.content?.find(c => typeof c === 'string' || c.type === 'paragraph');
                                            const text = typeof firstPara === 'string' ? firstPara : firstPara?.value;
                                            if (text) {
                                                return <div dangerouslySetInnerHTML={{ __html: text.replace(/<[^>]+>/g, '').substring(0, 250) + '...' }} />;
                                            }
                                            return null;
                                        })()}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function AboutPage() {
            return (
                <div className="center-content" style={{ padding: '40px', overflowY: 'auto', alignItems: 'center' }}>
                    <div style={{ maxWidth: '800px', width: '100%', margin: '0 auto', background: 'white', borderRadius: '24px', padding: '40px', border: '1px solid #e5e7eb', boxShadow: '0 10px 25px rgba(0,0,0,0.05)' }}>
                        <div style={{ textAlign: 'center', marginBottom: '32px' }}>
                            <div className="navbar-logo-circle" style={{ width: '60px', height: '60px', margin: '0 auto 16px' }}>
                                <img src="logo.png" alt="Logo" />
                            </div>
                            <h1 style={{ fontSize: '32px', fontWeight: '800', color: '#1f2937' }}>About Himdrishti</h1>
                            <div style={{ width: '40px', height: '4px', background: '#3b82f6', margin: '16px auto', borderRadius: '2px' }}></div>
                        </div>

                        <div style={{ fontSize: '16px', lineHeight: '1.8', color: '#4b5563', display: 'flex', flexDirection: 'column', gap: '20px' }}>
                            <p>
                                Himdrishti is a dedicated educational platform focused on guiding aspirants preparing for Civil Services and Himachal Pradesh state-level examinations. Based in Mandi, Himachal Pradesh, the platform aims to provide reliable, relevant, and high-quality content tailored to the needs of serious candidates.
                            </p>
                            <p>
                                At Himdrishti, we believe that consistent practice and clear understanding are the keys to success. Our platform offers well-structured test series, comprehensive courses, daily articles, and in-depth analysis to help aspirants stay updated and strengthen their preparation.
                            </p>
                            <p>
                                Special emphasis is given to Himachal Pradesh-specific exams, ensuring that learners receive focused content, current affairs coverage, and exam-oriented insights that are often missing in generic platforms.
                            </p>
                            <p>
                                Our mission is to simplify preparation, save time, and provide clarity by delivering accurate, concise, and meaningful content every day.
                            </p>
                            <p>
                                Whether you are just starting your journey or refining your strategy, Himdrishti is here to support you at every step.
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        function CoursesPage() {
            const courseList = [
                { title: 'UPSC Foundation 2027', price: '₹4,999', icon: '🎓', desc: 'Comprehensive GS Foundation course covering Prelims & Mains.' },
                { title: 'HPAS Special Batch', price: '₹3,499', icon: '🏔️', desc: 'Dedicated course for Himachal Pradesh Administrative Services.' },
                { title: 'Ethics & Essay Writing', price: '₹1,999', icon: '✍️', desc: 'Master the art of answer writing and ethical analysis.' },
                { title: 'Current Affairs Special', price: '₹999', icon: '🗞️', desc: 'Year-long coverage of national & HP specific current affairs.' }
            ];

                <div className="center-content" style={{ padding: '30px', overflowY: 'auto' }}>
                    <div style={{ maxWidth: '1000px', width: '100%', margin: '0 auto' }}>

                            <h1 style={{ fontSize: '32px', fontWeight: '800', color: '#1f2937' }}>Available Courses</h1>
                            <p style={{ color: '#6b7280', marginTop: '8px' }}>Expert-led structured programs for your success.</p>
                        </div>
                        <div className="categories-grid" style={{ gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))' }}>
                            {courseList.map((course, i) => (
                                <div key={i} className="category-card" style={{ cursor: 'default' }}>
                                    <div style={{ fontSize: '32px', marginBottom: '16px' }}>{course.icon}</div>
                                    <h3 style={{ fontSize: '18px', fontWeight: '700', marginBottom: '8px' }}>{course.title}</h3>
                                    <p style={{ fontSize: '14px', color: '#6b7280', marginBottom: '16px' }}>{course.desc}</p>

                                        <button className="cta-btn cta-primary" style={{ padding: '8px 16px', fontSize: '13px' }}>Enroll Now</button>

        function DownloadsPage({ downloads = [], categories = [] }) {
            const [activeCat, setActiveCat] = React.useState('All');
            const filtered = activeCat === 'All' ? downloads : downloads.filter(d => d.category === activeCat);

            return (
                <div className="center-content" style={{ padding: '30px', overflowY: 'auto' }}>
                    <div style={{ maxWidth: '1000px', width: '100%', margin: '0 auto' }}>
                        <div style={{ marginBottom: '32px', textAlign: 'center' }}>
                            <h1 style={{ fontSize: '32px', fontWeight: '800', color: '#1f2937' }}>Download Resources</h1>
                            <p style={{ color: '#6b7280', marginTop: '8px' }}>Premium study materials available for offline use.</p>
                        </div>

                        <div style={{ display: 'flex', gap: '10px', marginBottom: '30px', flexWrap: 'wrap', justifyContent: 'center' }}>
                            {['All', ...categories.map(c => c.name)].map(cat => (
                                <button
                                    key={cat}
                                    onClick={() => setActiveCat(cat)}
                                    className={`cta-btn ${activeCat === cat ? 'cta-primary' : 'cta-secondary'}`}
                                    style={{ padding: '8px 20px', fontSize: '13px', borderRadius: '50px' }}
                                >
                                    {cat}
                                </button>
                            ))}
                        </div>

                        <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                            {filtered.length > 0 ? filtered.map((item, i) => (
                                <div key={i} className="right-card" style={{ padding: '20px', display: 'flex', alignItems: 'center', gap: '20px' }}>
                                    <div style={{ fontSize: '28px', width: '50px', height: '50px', background: '#f8fafc', borderRadius: '12px', display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
                                        {item.imageLink ? <img src={item.imageLink} style={{ width: '100%', height: '100%', objectFit: 'cover' }} /> : '📁'}
                                    </div>
                                    <div style={{ flex: 1 }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px' }}>
                                            <h3 style={{ fontSize: '17px', fontWeight: '700', color: '#1f2937' }}>{item.name}</h3>
                                            {item.category && <span style={{ fontSize: '10px', background: '#eff6ff', color: '#2563eb', padding: '2px 8px', borderRadius: '4px', fontWeight: 600 }}>{item.category}</span>}
                                        </div>
                                        <div style={{ display: 'flex', gap: '12px' }}>
                                            <span style={{ fontSize: '12px', color: '#6b7280' }}>{item.description}</span>
                                        </div>
                                    </div>
                                    <button
                                        className="cta-btn cta-secondary"
                                        style={{ padding: '8px 20px', fontSize: '13px', display: 'flex', alignItems: 'center', gap: '8px' }}
                                        onClick={() => window.open(item.downloadLink, '_blank')}
                                    >
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg>
                                        Download
                                    </button>
                                </div>
                            )) : (
                                <div style={{ textAlign: 'center', padding: '40px', color: '#6b7280' }}>No resources available for this category yet.</div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function TestSeriesPage({ testSeries = [], onSeriesSelect, onHomeClick }) {
            return (
                <div className="center-content" style={{ padding: '30px', overflowY: 'auto' }}>
                    <div style={{ maxWidth: '1000px', width: '100%', margin: '0 auto' }}>
                        <button
                            onClick={onHomeClick}
                            style={{
                                display: 'flex',
                                alignItems: 'center',
                                gap: '8px',
                                background: 'none',
                                border: 'none',
                                color: '#2563eb',
                                fontWeight: 700,
                                cursor: 'pointer',
                                marginBottom: '20px',
                                fontSize: '14px'
                            }}
                        >
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>

                        </button>
                        <div style={{ marginBottom: '40px', textAlign: 'center' }}>
                            <div style={{

                                display: 'flex',
                                alignItems: 'center',

                            </div>
                            <h1 style={{ fontSize: '32px', fontWeight: '800', color: '#1f2937' }}>Test Series by Himdrishti</h1>
                            <p style={{ color: '#6b7280', marginTop: '12px', fontSize: '16px', lineHeight: '1.6' }}>

                                Get detailed analysis, performance tracking, and high-quality questions.
                            </p>
                        </div>

                        <div style={{
                            display: 'grid',

                                        textAlign: 'center',

                                        fontWeight: '700',

                                        display: 'flex',

                                        alignItems: 'center',

                                        cursor: 'pointer'

                                        e.currentTarget.style.borderColor = 'rgba(37, 99, 235, 0.2)';

                                >

                                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ color: '#2563eb' }}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" /><rect x="8" y="2" width="8" height="4" rx="1" ry="1" /></svg>
                                    </div>
                                    {ts.title}
                                </button>

                                <div style={{ gridColumn: '1/-1', textAlign: 'center', padding: '40px', color: '#6b7280' }}>No test series available at the moment. Stay tuned!</div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function TestSeriesDetailView({ series, onBack }) {
            return (
                <div className="center-content" style={{ padding: '30px', overflowY: 'auto', paddingTop: '120px' }}>
                    <div style={{ maxWidth: '850px', width: '100%', margin: '0 auto' }}>
                        {/* Static Back Button */}
                        <div style={{ marginBottom: '24px' }}>
                            <button
                                onClick={onBack}
                                style={{
                                    display: 'flex',
                                    alignItems: 'center',
                                    gap: '8px',
                                    background: '#eff6ff',
                                    border: '1px solid rgba(37,99,235,0.1)',
                                    color: '#2563eb',
                                    fontWeight: 700,
                                    cursor: 'pointer',
                                    padding: '8px 18px',
                                    borderRadius: '50px',
                                    fontSize: '13px',
                                    transition: 'all 0.3s ease'
                                }}
                                onMouseEnter={e => { e.currentTarget.style.background = '#dbeafe'; }}
                                onMouseLeave={e => { e.currentTarget.style.background = '#eff6ff'; }}
                            >
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                                Back to Series
                            </button>
                        </div>

                        <div style={{ marginBottom: '40px' }}>
                            <h1 style={{ fontSize: '32px', fontWeight: '800', color: '#1f2937', marginBottom: '12px' }}>{series.title}</h1>
                            <p style={{ fontSize: '16px', color: '#6b7280' }}>{series.desc}</p>
                        </div>

                        <div className="series-content-flow" style={{ display: 'flex', flexDirection: 'column', gap: '30px', marginBottom: '40px' }}>
                            {(series.content || []).map((item, i) => {
                                if (item.type === 'paragraph') {
                                    return <div key={i} className="article-paragraph" dangerouslySetInnerHTML={{ __html: item.value }} style={{ fontSize: '16px', lineHeight: '1.8', color: '#374151' }}></div>;
                                }
                                if (item.type === 'image' && item.value) {
