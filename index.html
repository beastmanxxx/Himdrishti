<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Himdrishti</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f0f13; color: #e0e0e0; overflow: hidden; height: 100vh; }

        /* Top Navbar */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; height: 60px; z-index: 100;
            background: rgba(15, 15, 19, 0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
        }
        .navbar-logo-circle {
            width: 36px; height: 36px; border-radius: 50%;
            background: #ffffff; display: flex; align-items: center; justify-content: center;
            overflow: hidden; flex-shrink: 0;
        }
        .navbar-logo-circle img {
            width: 24px; height: 24px; object-fit: contain;
        }
        .navbar-logo {
            font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
            background: linear-gradient(135deg, #6ee7b7, #3b82f6, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .navbar-links { display: flex; gap: 8px; align-items: center; }
        .nav-link {
            position: relative; padding: 8px 18px; font-size: 14px; font-weight: 500;
            color: #9ca3af; cursor: pointer; border-radius: 8px; transition: all 0.3s ease;
            text-decoration: none; overflow: hidden;
        }
        .nav-link::before {
            content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
            width: 0; height: 2px; border-radius: 2px;
            background: linear-gradient(90deg, #6ee7b7, #3b82f6);
            transition: width 0.3s ease;
        }
        .nav-link:hover { color: #ffffff; background: rgba(255,255,255,0.05); }
        .nav-link:hover::before { width: 60%; }
        .nav-link-active { color: #ffffff; }
        .nav-link-active::before { width: 60%; }
        .navbar-actions { display: flex; gap: 12px; align-items: center; }
        .nav-btn {
            padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 600;
            cursor: pointer; border: none; transition: all 0.3s ease;
        }
        .nav-btn-outline {
            background: transparent; color: #9ca3af; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-btn-outline:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
        .nav-btn-primary {
            background: linear-gradient(135deg, #6ee7b7, #3b82f6); color: #0f0f13;
        }
        .nav-btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(59,130,246,0.3); }

        /* Running animation text */
        .running-text {
            overflow: hidden; white-space: nowrap; max-width: 200px;
        }
        .running-text span {
            display: inline-block; animation: runText 8s linear infinite;
        }
        @keyframes runText {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* Layout */
        .main-layout { display: flex; height: 100vh; padding-top: 60px; }

        /* Left Sidebar */
        .sidebar-left {
            width: 240px; min-width: 240px; height: 100%;
            background: rgba(15, 15, 19, 0.6);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255,255,255,0.06);
            padding: 20px 12px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 4px;
        }
        .sidebar-section-title {
            font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px;
            color: #4b5563; padding: 12px 12px 8px; margin-top: 8px;
        }
        .sidebar-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 12px;
            border-radius: 8px; cursor: pointer; transition: all 0.25s ease;
            color: #9ca3af; font-size: 14px; font-weight: 500;
        }
        .sidebar-item:hover { background: rgba(255,255,255,0.06); color: #e5e7eb; }
        .sidebar-item-active { background: rgba(59,130,246,0.1); color: #6ee7b7; }
        .sidebar-item-active:hover { background: rgba(59,130,246,0.15); }
        .sidebar-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 16px; }

        /* Center Content */
        .center-content {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .center-bg-glow {
            position: absolute; width: 500px; height: 500px; border-radius: 50%;
            filter: blur(120px); opacity: 0.15; pointer-events: none;
        }
        .glow-1 { background: #3b82f6; top: 20%; left: 30%; animation: floatGlow 8s ease-in-out infinite; }
        .glow-2 { background: #a78bfa; bottom: 20%; right: 30%; animation: floatGlow 8s ease-in-out infinite reverse; }
        .glow-3 { background: #6ee7b7; top: 50%; left: 50%; transform: translate(-50%,-50%); animation: pulseGlow 4s ease-in-out infinite; }
        @keyframes floatGlow {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.1; transform: translate(-50%,-50%) scale(1); }
            50% { opacity: 0.2; transform: translate(-50%,-50%) scale(1.2); }
        }

        .welcome-badge {
            display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px;
            background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2);
            border-radius: 50px; font-size: 13px; font-weight: 500; color: #6ee7b7;
            margin-bottom: 24px; animation: fadeInUp 0.8s ease forwards;
        }
        .badge-dot {
            width: 6px; height: 6px; border-radius: 50%; background: #6ee7b7;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.5); }
        }

        .welcome-title {
            font-size: 56px; font-weight: 800; letter-spacing: -2px; line-height: 1.1;
            text-align: center; margin-bottom: 16px;
            animation: fadeInUp 0.8s ease 0.2s both;
        }
        .welcome-title-gradient {
            background: linear-gradient(135deg, #6ee7b7 0%, #3b82f6 50%, #a78bfa 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            animation: gradientShift 4s ease-in-out infinite;
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .welcome-subtitle {
            font-size: 18px; color: #6b7280; font-weight: 400; text-align: center;
            max-width: 500px; line-height: 1.6; animation: fadeInUp 0.8s ease 0.4s both;
        }
        .welcome-cta {
            display: flex; gap: 12px; margin-top: 32px; animation: fadeInUp 0.8s ease 0.6s both;
        }
        .cta-btn {
            padding: 12px 28px; border-radius: 10px; font-size: 14px; font-weight: 600;
            cursor: pointer; border: none; transition: all 0.3s ease;
        }
        .cta-primary {
            background: linear-gradient(135deg, #6ee7b7, #3b82f6); color: #0f0f13;
        }
        .cta-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(59,130,246,0.3); }
        .cta-secondary {
            background: rgba(255,255,255,0.05); color: #e5e7eb; border: 1px solid rgba(255,255,255,0.1);
        }
        .cta-secondary:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Right Sidebar */
        .sidebar-right {
            width: 280px; min-width: 280px; height: 100%;
            background: rgba(15, 15, 19, 0.6);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(255,255,255,0.06);
            padding: 20px 16px; overflow-y: auto;
        }
        .right-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px; padding: 16px; margin-bottom: 12px;
            transition: all 0.3s ease;
        }
        .right-card:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }
        .right-card-title {
            font-size: 13px; font-weight: 600; color: #e5e7eb; margin-bottom: 8px;
        }
        .right-card-text { font-size: 12px; color: #6b7280; line-height: 1.5; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
        .stat-label { font-size: 12px; color: #6b7280; }
        .stat-value { font-size: 14px; font-weight: 600; color: #6ee7b7; }
        .progress-bar {
            width: 100%; height: 4px; background: rgba(255,255,255,0.06); border-radius: 4px;
            margin-top: 6px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; border-radius: 4px;
            background: linear-gradient(90deg, #6ee7b7, #3b82f6);
            animation: progressGrow 1.5s ease forwards;
        }
        @keyframes progressGrow {
            from { width: 0; }
        }
        .activity-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .activity-item {
            display: flex; align-items: center; gap: 10px; padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .activity-item:last-child { border-bottom: none; }
        .activity-text { font-size: 12px; color: #9ca3af; }
        .activity-time { font-size: 11px; color: #4b5563; margin-left: auto; }

        /* Hamburger Button */
        .hamburger-btn {
            display: none; background: none; border: none; cursor: pointer;
            padding: 4px; color: #9ca3af; transition: color 0.3s;
        }
        .hamburger-btn:hover { color: #ffffff; }
        .hamburger-btn-right {
            display: block; background: none; border: none; cursor: pointer;
            padding: 4px; color: #9ca3af; transition: color 0.3s;
        }
        .hamburger-btn-right:hover { color: #ffffff; }
        .hamburger-line {
            display: block; width: 22px; height: 2px; background: currentColor;
            border-radius: 2px; transition: all 0.3s ease;
        }
        .hamburger-line + .hamburger-line { margin-top: 5px; }
        .hamburger-btn.open .hamburger-line:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger-btn.open .hamburger-line:nth-child(2) { opacity: 0; }
        .hamburger-btn.open .hamburger-line:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
        .hamburger-btn-right.open .hamburger-line:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger-btn-right.open .hamburger-line:nth-child(2) { opacity: 0; }
        .hamburger-btn-right.open .hamburger-line:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        /* Mobile Dropdown Menu */
        .mobile-menu {
            display: none; position: fixed; top: 60px; left: 0; right: 0;
            background: rgba(15, 15, 19, 0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 16px 24px; z-index: 99;
            animation: slideDown 0.3s ease;
        }
        .mobile-menu.open { display: block; }
        .mobile-menu-link {
            display: block; padding: 12px 16px; font-size: 15px; font-weight: 500;
            color: #9ca3af; cursor: pointer; border-radius: 8px; transition: all 0.25s ease;
            text-decoration: none;
        }
        .mobile-menu-link:hover { background: rgba(255,255,255,0.06); color: #ffffff; }
        .mobile-menu-link-active { color: #6ee7b7; background: rgba(59,130,246,0.1); }
        .mobile-menu-divider {
            height: 1px; background: rgba(255,255,255,0.06); margin: 8px 0;
        }
        .mobile-menu-actions {
            display: flex; gap: 12px; margin-top: 12px; padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Right sidebar overlay for mobile/tablet */
        .sidebar-right-overlay {
            display: none; position: fixed; top: 60px; right: 0; bottom: 0;
            width: 300px; z-index: 90;
            background: rgba(15, 15, 19, 0.95); backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255,255,255,0.06);
            padding: 20px 16px; overflow-y: auto;
            animation: slideRight 0.3s ease;
        }
        .sidebar-right-overlay.open { display: block; }
        @keyframes slideRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .sidebar-overlay-backdrop {
            display: none; position: fixed; top: 60px; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 89;
        }
        .sidebar-overlay-backdrop.open { display: block; }

        /* Left sidebar toggle arrow icon */
        .left-arrow-btn {
            display: none; position: fixed; top: 68px; left: 12px; z-index: 90;
            width: 32px; height: 32px; border-radius: 8px;
            background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.2);
            color: #6ee7b7; cursor: pointer;
            align-items: center; justify-content: center;
            transition: all 0.3s ease;
            animation: bounceArrow 2s ease-in-out infinite;
        }
        .left-arrow-btn:hover { background: rgba(59,130,246,0.25); transform: scale(1.1); }
        @keyframes bounceArrow {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(4px); }
        }

        /* Left sidebar overlay for mobile/tablet */
        .sidebar-left-overlay {
            display: none; position: fixed; top: 60px; left: 0; bottom: 0;
            width: 280px; z-index: 90;
            background: rgba(15, 15, 19, 0.95); backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.06);
            padding: 20px 12px; overflow-y: auto;
            animation: slideLeft 0.3s ease;
        }
        .sidebar-left-overlay.open { display: block; }
        @keyframes slideLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .sidebar-left-backdrop {
            display: none; position: fixed; top: 60px; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 89;
        }
        .sidebar-left-backdrop.open { display: block; }
        @media (min-width: 1353px) {
            .sidebar-left-overlay, .sidebar-left-backdrop, .left-arrow-btn { display: none !important; }
            .sidebar-right-overlay, .sidebar-overlay-backdrop { display: none !important; }
        }

        /* Responsive: Tablet */
        @media (max-width: 1352px) {
            .navbar-links { display: none; }
            .running-text { display: none; }
            .hamburger-btn { display: block; }
            .sidebar-left { display: none; }
            .sidebar-right { display: none; }
            .left-arrow-btn { display: flex; }
            .sidebar-right-overlay { width: 280px; }
            .welcome-title { font-size: 42px; }
            .welcome-subtitle { font-size: 16px; max-width: 400px; }
            .center-bg-glow { width: 350px; height: 350px; }
        }

        /* Responsive: Mobile */
        @media (max-width: 768px) {
            body { overflow-y: auto; overflow-x: hidden; }
            .navbar { padding: 0 16px; }
            .navbar-actions .nav-btn-outline { display: none; }
            .sidebar-left { display: none; }
            .sidebar-right { display: none; }
            .left-arrow-btn { display: flex; }
            .sidebar-left-overlay { width: 260px; }
            .sidebar-right-overlay { width: 260px; }
            .main-layout { padding-top: 60px; }
            .center-content { padding: 40px 20px; min-height: calc(100vh - 60px); }
            .welcome-title { font-size: 32px; letter-spacing: -1px; }
            .welcome-subtitle { font-size: 14px; max-width: 300px; }
            .welcome-badge { font-size: 12px; padding: 5px 12px; }
            .welcome-cta { flex-direction: column; align-items: center; }
            .cta-btn { width: 100%; max-width: 280px; text-align: center; }
            .center-bg-glow { width: 250px; height: 250px; }
            .mobile-menu-actions .nav-btn-outline { display: inline-flex; }
        }

        /* Responsive: Small Mobile */
        @media (max-width: 480px) {
            .navbar-logo { font-size: 18px; }
            .navbar-logo-circle { width: 30px; height: 30px; }
            .navbar-logo-circle img { width: 20px; height: 20px; }
            .welcome-title { font-size: 26px; }
            .welcome-subtitle { font-size: 13px; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icons as simple SVG components
        const Icons = {
            Home: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,

            Mail: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>,
            HelpCircle: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
        };

        function Navbar({ rightSidebarOpen, setRightSidebarOpen }) {
            const [activeLink, setActiveLink] = useState('Home');
            const [menuOpen, setMenuOpen] = useState(false);
            const menuRef = React.useRef(null);
            const btnRef = React.useRef(null);
            const rightBtnRef = React.useRef(null);
            const links = ['Home', 'Courses', 'Test Series', 'Optional', 'Articles / Blog', 'Downloads'];

            const handleLinkClick = (link) => {
                setActiveLink(link);
                setMenuOpen(false);
            };

            useEffect(() => {
                const handleClickOutside = (e) => {
                    if (menuOpen && menuRef.current && btnRef.current &&
                        !menuRef.current.contains(e.target) &&
                        !btnRef.current.contains(e.target)) {
                        setMenuOpen(false);
                    }
                    if (rightSidebarOpen && rightBtnRef.current &&
                        !rightBtnRef.current.contains(e.target) &&
                        !e.target.closest('.sidebar-right')) {
                        setRightSidebarOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, [menuOpen, rightSidebarOpen]);

            return (
                <>
                    <nav className="navbar">
                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                            <button ref={btnRef} className={`hamburger-btn ${menuOpen ? 'open' : ''}`} onClick={() => setMenuOpen(!menuOpen)}>
                                <span className="hamburger-line"></span>
                                <span className="hamburger-line"></span>
                                <span className="hamburger-line"></span>
                            </button>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                <div className="navbar-logo-circle">
                                    <img src="logo.png" alt="Himdrishti Logo" />
                                </div>
                                <div className="navbar-logo">Himdrishti</div>
                            </div>
                            <div className="running-text">
                                <span style={{ color: '#4b5563', fontSize: '12px' }}>
                                    ✨ Empowering Vision Through Technology — Himdrishti Platform ✨
                                </span>
                            </div>
                        </div>
                        <div className="navbar-links">
                            {links.map(link => (
                                <a
                                    key={link}
                                    className={`nav-link ${activeLink === link ? 'nav-link-active' : ''}`}
                                    onClick={() => setActiveLink(link)}
                                >
                                    {link}
                                </a>
                            ))}
                        </div>
                        <div className="navbar-actions">
                            <div style={{ position: 'relative', cursor: 'pointer', color: '#9ca3af', transition: 'color 0.3s' }}
                                 onMouseEnter={e => e.currentTarget.style.color = '#fff'}
                                 onMouseLeave={e => e.currentTarget.style.color = '#9ca3af'}>
                                <Icons.Bell />
                                <div style={{
                                    position: 'absolute', top: -2, right: -2, width: 8, height: 8,
                                    borderRadius: '50%', background: '#6ee7b7', border: '2px solid #0f0f13'
                                }}></div>
                            </div>
                            <button className="nav-btn nav-btn-outline">Sign In</button>
                            <button className="nav-btn nav-btn-primary">Get Started</button>
                            <button ref={rightBtnRef} className={`hamburger-btn-right ${rightSidebarOpen ? 'open' : ''}`} onClick={() => setRightSidebarOpen(!rightSidebarOpen)} title="Toggle Right Sidebar">
                                <span className="hamburger-line"></span>
                                <span className="hamburger-line"></span>
                                <span className="hamburger-line"></span>
                            </button>
                        </div>
                    </nav>
                    <div ref={menuRef} className={`mobile-menu ${menuOpen ? 'open' : ''}`}>
                        {links.map(link => (
                            <a
                                key={link}
                                className={`mobile-menu-link ${activeLink === link ? 'mobile-menu-link-active' : ''}`}
                                onClick={() => handleLinkClick(link)}
                            >
                                {link}
                            </a>
                        ))}
                        <div className="mobile-menu-actions">
                            <button className="nav-btn nav-btn-outline" style={{ flex: 1 }}>Sign In</button>
                            <button className="nav-btn nav-btn-primary" style={{ flex: 1 }}>Get Started</button>
                        </div>
                    </div>
                </>
            );
        }

        function LeftSidebarContent() {
            const [activeItem, setActiveItem] = useState('Subjects');
            const mainItems = [
                { name: 'Subjects', icon: <Icons.File /> },
                { name: 'Exams', icon: <Icons.Chart /> },
                { name: 'Sample Papers', icon: <Icons.Dashboard /> },
                { name: 'Blueprint', icon: <Icons.Dashboard /> },
                { name: 'Syllabus', icon: <Icons.File /> },
            ];
            const moreItems = [
                { name: 'Previous Year Papers', icon: <Icons.File /> },
                { name: 'Study Material', icon: <Icons.File /> },
                { name: 'Notes', icon: <Icons.File /> },
                { name: 'Video Lectures', icon: <Icons.Dashboard /> },
            ];
            const bottomItems = [
                { name: 'Settings', icon: <Icons.Settings /> },
                { name: 'Help', icon: <Icons.HelpCircle /> },
            ];

            return (
                <>
                    <div className="sidebar-section-title">Resources</div>
                    {mainItems.map(item => (
                        <div
                            key={item.name}
                            className={`sidebar-item ${activeItem === item.name ? 'sidebar-item-active' : ''}`}
                            onClick={() => setActiveItem(item.name)}
                        >
                            <span className="sidebar-icon">{item.icon}</span>
                            {item.name}
                        </div>
                    ))}
                    <div className="sidebar-section-title">More</div>
                    {moreItems.map(item => (
                        <div
                            key={item.name}
                            className={`sidebar-item ${activeItem === item.name ? 'sidebar-item-active' : ''}`}
                            onClick={() => setActiveItem(item.name)}
                        >
                            <span className="sidebar-icon">{item.icon}</span>
                            {item.name}
                        </div>
                    ))}
                    <div style={{ flex: 1 }}></div>
                    <div className="sidebar-section-title">Support</div>
                    {bottomItems.map(item => (
                        <div
                            key={item.name}
                            className={`sidebar-item ${activeItem === item.name ? 'sidebar-item-active' : ''}`}
                            onClick={() => setActiveItem(item.name)}
                        >
                            <span className="sidebar-icon">{item.icon}</span>
                            {item.name}
                        </div>
                    ))}
                </>
            );
        }

        function LeftSidebar() {
            return (
                <div className="sidebar-left">
                    <LeftSidebarContent />
                </div>
            );
        }

        function CenterContent() {
            return (
                <div className="center-content">
                    <div className="center-bg-glow glow-1"></div>
                    <div className="center-bg-glow glow-2"></div>
                    <div className="center-bg-glow glow-3"></div>

                    <div className="welcome-badge">
                        <span className="badge-dot"></span>
                        Platform Active
                    </div>

                    <h1 className="welcome-title">
                        Welcome to{' '}
                        <span className="welcome-title-gradient">Himdrishti</span>
                    </h1>

                    <p className="welcome-subtitle">
                        Your unified platform for insights, analytics, and seamless collaboration.
                        Explore the power of vision-driven technology.
                    </p>

                    <div className="welcome-cta">
                        <button className="cta-btn cta-primary">Explore Dashboard</button>
                        <button className="cta-btn cta-secondary">Learn More</button>
                    </div>
                </div>
            );
        }

        function RightSidebarContent() {
            const articles = [
                {
                    title: 'How to Crack UPSC in First Attempt',
                    category: 'UPSC',
                    date: 'May 2, 2026',
                    readTime: '5 min read',
                    color: '#6ee7b7',
                },
                {
                    title: 'Understanding Indian Polity for Prelims',
                    category: 'Polity',
                    date: 'Apr 28, 2026',
                    readTime: '7 min read',
                    color: '#3b82f6',
                },
                {
                    title: 'Geography: Key Map Points to Remember',
                    category: 'Geography',
                    date: 'Apr 25, 2026',
                    readTime: '4 min read',
                    color: '#a78bfa',
                },
                {
                    title: 'Economic Survey 2026: Highlights & Analysis',
                    category: 'Economy',
                    date: 'Apr 20, 2026',
                    readTime: '8 min read',
                    color: '#f59e0b',
                },
                {
                    title: 'Environment & Ecology: Current Affairs Digest',
                    category: 'Environment',
                    date: 'Apr 18, 2026',
                    readTime: '6 min read',
                    color: '#6ee7b7',
                },
                {
                    title: 'History of Modern India: Timeline Approach',
                    category: 'History',
                    date: 'Apr 15, 2026',
                    readTime: '10 min read',
                    color: '#3b82f6',
                },
            ];

            return (
                <>
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '16px' }}>
                        <div className="right-card-title" style={{ margin: 0, fontSize: '15px' }}>Articles & Blogs</div>
                        <span style={{ fontSize: '11px', color: '#3b82f6', cursor: 'pointer', fontWeight: 500 }}>View All</span>
                    </div>
                    {articles.map((article, i) => (
                        <div key={i} className="right-card" style={{ cursor: 'pointer' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '6px' }}>
                                <span style={{
                                    fontSize: '10px', fontWeight: 600, padding: '2px 8px',
                                    borderRadius: '4px', background: `${article.color}20`, color: article.color,
                                    textTransform: 'uppercase', letterSpacing: '0.5px',
                                }}>
                                    {article.category}
                                </span>
                                <span style={{ fontSize: '10px', color: '#4b5563', marginLeft: 'auto' }}>{article.readTime}</span>
                            </div>
                            <div style={{ fontSize: '13px', fontWeight: 600, color: '#e5e7eb', lineHeight: '1.4', marginBottom: '4px' }}>
                                {article.title}
                            </div>
                            <div style={{ fontSize: '11px', color: '#4b5563' }}>{article.date}</div>
                        </div>
                    ))}
                </>
            );
        }

        function RightSidebar() {
            return (
                <div className="sidebar-right">
                    <RightSidebarContent />
                </div>
            );
        }

        function App() {
            const [rightSidebarOpen, setRightSidebarOpen] = useState(true);
            const [leftSidebarOpen, setLeftSidebarOpen] = useState(false);

            return (
                <>
                    <Navbar rightSidebarOpen={rightSidebarOpen} setRightSidebarOpen={setRightSidebarOpen} />
                    <button className="left-arrow-btn" onClick={() => setLeftSidebarOpen(!leftSidebarOpen)} title="Open Sidebar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                    <div className="main-layout">
                        <LeftSidebar />
                        <CenterContent />
                        {rightSidebarOpen && <RightSidebar />}
                    </div>
                    <div className={`sidebar-overlay-backdrop ${rightSidebarOpen ? 'open' : ''}`} onClick={() => setRightSidebarOpen(false)}></div>
                    <div className={`sidebar-right-overlay ${rightSidebarOpen ? 'open' : ''}`}>
                        <RightSidebarContent />
                    </div>
                    <div className={`sidebar-left-backdrop ${leftSidebarOpen ? 'open' : ''}`} onClick={() => setLeftSidebarOpen(false)}></div>
                    <div className={`sidebar-left-overlay ${leftSidebarOpen ? 'open' : ''}`}>
                        <LeftSidebarContent />
                    </div>
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
